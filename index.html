<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XRP Overlay</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Inter, Arial, sans-serif;
    overflow: hidden;
}

/* CONTAINER */
.container {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: fit-content;

    opacity: 0;
    transform: translateY(-10px);
    transition: all 1s ease;
}

.container.visible {
    opacity: 1;
    transform: translateY(0);
}

/* BUTTON */
.btn {
    background: rgba(120,120,120,0.8);
    border-radius: 14px;
    padding: 6px 14px;
    font-size: 14px;
    font-weight: 600;
    color: white;

    display: inline-block;
    width: fit-content;

    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.8s ease;
}

/* SHOW */
.btn.show {
    opacity: 1;
    transform: translateY(0);
}

/* HIDE ANIMATION (SLOW + UP) */
.btn.hide {
    opacity: 0;
    transform: translateY(-40px);
    transition: all 3s cubic-bezier(0.22, 1, 0.36, 1);
}

/* COLORS */
.green { color: #40e100; }
.red { color: #ff0000; }

.label {
    opacity: 0.7;
    margin-right: 6px;
}
</style>
</head>

<body>

<div class="container" id="container">
    <div class="btn" id="b1"></div>
    <div class="btn" id="b2"></div>
    <div class="btn" id="b3"></div>
    <div class="btn" id="b4"></div>
    <div class="btn" id="b5"></div>
    <div class="btn" id="b6"></div>
</div>

<script>
const container = document.getElementById("container");

const buttons = [
    b1, b2, b3, b4, b5, b6
];

const periods = [
    {h: 6, label: "6H"},
    {h: 12, label: "12H"},
    {h: 24, label: "24H"},
    {h: 48, label: "48H"},
    {h: 72, label: "72H"},
    {h: 168, label: "WEEK"},
];

// --- FETCH ---
async function getCurrentPrice() {
    const r = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=XRPUSDT");
    const d = await r.json();
    return parseFloat(d.price);
}

async function getPastPrice(h) {
    const now = Date.now();
    const past = now - h * 3600000;

    const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=XRPUSDT&interval=1h&startTime=${past}&limit=1`);
    const d = await r.json();
    return parseFloat(d[0][1]);
}

// --- UPDATE ---
async function updateData() {
    const current = await getCurrentPrice();

    for (let i = 0; i < periods.length; i++) {
        const p = periods[i];
        const past = await getPastPrice(p.h);

        const change = ((current - past) / past) * 100;
        const positive = change >= 0;

        buttons[i].innerHTML = `
            <span class="label">${p.label}</span>
            <span class="${positive ? 'green' : 'red'}">
                ${positive ? '+' : ''}${change.toFixed(2)}%
            </span>
        `;
    }
}

// --- SHOW ---
function showSequence() {
    container.classList.add("visible");

    buttons.forEach((btn, i) => {
        setTimeout(() => btn.classList.add("show"), i * 200);
    });
}

// --- HIDE (BOTTOM → TOP, 3s) ---
function hideSequence() {

    // reverse order (bottom first)
    [...buttons].reverse().forEach((btn, i) => {
        setTimeout(() => {
            btn.classList.add("hide");
        }, i * 250);
    });

    // container fade after animation
    setTimeout(() => {
        container.classList.remove("visible");

        // reset classes
        buttons.forEach(btn => {
            btn.classList.remove("show", "hide");
        });

    }, 3200);
}

// --- LOOP ---
async function loop() {
    while (true) {
        await updateData();

        showSequence();
        await sleep(30000);

        hideSequence();
        await sleep(60000);
    }
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

loop();
</script>

</body>
</html>
