<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XRP Overlay Modern</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Inter, Arial, sans-serif;
    overflow: hidden;
}

/* CONTAINER */
.container {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 240px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.8s ease;
}

.container.visible {
    opacity: 1;
    transform: translateY(0);
}

/* BUTTON */
.btn {
    background: rgba(20,20,20,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 11px 14px; /* ~20% smaller */
    color: white;
    font-size: 15px;
    font-weight: 600;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    opacity: 0;
    transform: translateY(-15px) scale(0.95);
    transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* SHOW (bounce / "brawler") */
.btn.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* hover micro interaction */
.btn:hover {
    transform: scale(1.05);
    border-color: rgba(255,255,255,0.2);
}

/* COLORS */
.green { color: #00ffa2; }
.red { color: #ff3b3b; }

/* subtle glow */
.green.glow { text-shadow: 0 0 8px rgba(0,255,150,0.6); }
.red.glow { text-shadow: 0 0 8px rgba(255,60,60,0.6); }

.label {
    opacity: 0.7;
    font-weight: 500;
    margin-right: 6px;
}
</style>
</head>

<body>

<div class="container" id="container">
    <div class="btn" id="b1"></div>
    <div class="btn" id="b2"></div>
    <div class="btn" id="b3"></div>
    <div class="btn" id="b4"></div>
</div>

<script>
const container = document.getElementById("container");
const buttons = [
    document.getElementById("b1"),
    document.getElementById("b2"),
    document.getElementById("b3"),
    document.getElementById("b4"),
];

const periods = [24, 48, 72, 168];

// --- FETCH CURRENT ONCE ---
async function getCurrentPrice() {
    const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=XRPUSDT");
    const data = await res.json();
    return parseFloat(data.price);
}

// --- FETCH HISTORICAL ---
async function getPastPrice(hoursAgo) {
    const now = Date.now();
    const past = now - hoursAgo * 60 * 60 * 1000;

    const url = `https://api.binance.com/api/v3/klines?symbol=XRPUSDT&interval=1h&startTime=${past}&limit=1`;
    const res = await fetch(url);
    const data = await res.json();

    return parseFloat(data[0][1]);
}

// --- UPDATE UI ---
async function updateData() {
    const current = await getCurrentPrice();

    for (let i = 0; i < periods.length; i++) {
        const past = await getPastPrice(periods[i]);
        const change = ((current - past) / past) * 100;

        const el = buttons[i];
        const isPositive = change >= 0;

        const color = isPositive ? "green glow" : "red glow";

        el.innerHTML = `
            <span class="label">${periods[i]}H</span>
            <span class="${color}">
                ${isPositive ? "+" : ""}${change.toFixed(2)}%
            </span>
        `;
    }
}

// --- ANIMATION ---
function showSequence() {
    container.classList.add("visible");

    buttons.forEach((btn, i) => {
        setTimeout(() => {
            btn.classList.add("show");
        }, i * 220); // faster cascade
    });
}

function hideSequence() {
    buttons.forEach(btn => btn.classList.remove("show"));
    container.classList.remove("visible");
}

// --- LOOP ---
async function loop() {
    while (true) {
        await updateData();

        showSequence();
        await sleep(30000);

        hideSequence();
        await sleep(60000);
    }
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

loop();
</script>

</body>
</html>
