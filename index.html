<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XRP Overlay Compact</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Inter, Arial, sans-serif;
    overflow: hidden;
}

/* CONTAINER */
.container {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 230px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.8s ease;
}

.container.visible {
    opacity: 1;
    transform: translateY(0);
}

/* BUTTON */
.btn {
    background: rgba(20,20,20,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 12px;
    color: white;
    font-size: 14px;
    font-weight: 600;

    backdrop-filter: blur(10px);

    opacity: 0;
    transform: translateY(-12px) scale(0.94);
    transition: all 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.btn.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

.btn:hover {
    transform: scale(1.05);
    border-color: rgba(255,255,255,0.2);
}

/* COLORS */
.green { color: #40e100; }
.red { color: #ff0000; }

.green.glow { text-shadow: 0 0 6px rgba(64,225,0,0.7); }
.red.glow { text-shadow: 0 0 6px rgba(255,0,0,0.7); }

.label {
    opacity: 0.7;
    font-weight: 500;
    margin-right: 6px;
}
</style>
</head>

<body>

<div class="container" id="container">
    <div class="btn" id="b1"></div>
    <div class="btn" id="b2"></div>
    <div class="btn" id="b3"></div>
    <div class="btn" id="b4"></div>
    <div class="btn" id="b5"></div>
    <div class="btn" id="b6"></div>
</div>

<script>
const container = document.getElementById("container");

const buttons = [
    document.getElementById("b1"),
    document.getElementById("b2"),
    document.getElementById("b3"),
    document.getElementById("b4"),
    document.getElementById("b5"),
    document.getElementById("b6"),
];

const periods = [
    {h: 6, label: "6H"},
    {h: 12, label: "12H"},
    {h: 24, label: "24H"},
    {h: 48, label: "48H"},
    {h: 72, label: "72H"},
    {h: 168, label: "WEEK"},
];

// --- FETCH CURRENT ---
async function getCurrentPrice() {
    const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=XRPUSDT");
    const data = await res.json();
    return parseFloat(data.price);
}

// --- FETCH HISTORICAL ---
async function getPastPrice(hoursAgo) {
    const now = Date.now();
    const past = now - hoursAgo * 60 * 60 * 1000;

    const url = `https://api.binance.com/api/v3/klines?symbol=XRPUSDT&interval=1h&startTime=${past}&limit=1`;
    const res = await fetch(url);
    const data = await res.json();

    return parseFloat(data[0][1]);
}

// --- UPDATE ---
async function updateData() {
    const current = await getCurrentPrice();

    for (let i = 0; i < periods.length; i++) {
        const p = periods[i];
        const past = await getPastPrice(p.h);

        const change = ((current - past) / past) * 100;
        const isPositive = change >= 0;

        const color = isPositive ? "green glow" : "red glow";

        buttons[i].innerHTML = `
            <span class="label">${p.label}</span>
            <span class="${color}">
                ${isPositive ? "+" : ""}${change.toFixed(2)}%
            </span>
        `;
    }
}

// --- ANIMATION ---
function showSequence() {
    container.classList.add("visible");

    buttons.forEach((btn, i) => {
        setTimeout(() => {
            btn.classList.add("show");
        }, i * 180);
    });
}

function hideSequence() {
    buttons.forEach(btn => btn.classList.remove("show"));
    container.classList.remove("visible");
}

// --- LOOP ---
async function loop() {
    while (true) {
        await updateData();

        showSequence();
        await sleep(30000);

        hideSequence();
        await sleep(60000);
    }
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

loop();
</script>

</body>
</html>
